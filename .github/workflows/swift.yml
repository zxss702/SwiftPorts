---
name: Swift
on:
  push:
    branches:
      - main
      - 'eval/**'
      - 'feat/**'
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      # macos-latest currently ships Xcode 16 / Swift 6.1; we need 6.2
      # because swift-configuration uses tools-version 6.2.
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Install C dependencies (Homebrew)
        # bzip2 / zstd are needed by Bzip2Kit / ZstdKit and by
        # libarchive's bz2 / zstd filters. xz is no longer needed on
        # macOS — XzKit now uses Apple's Compression.framework via
        # `canImport(Compression)` (works on every Apple platform);
        # libarchive's `lzma` filter is similarly disabled on Apple
        # via the swift-archive per-platform-traits fork. brotli /
        # lzfse / lz4 land under the same Apple-framework strategy
        # when their kits arrive. `brew list || brew install` keeps
        # the log quiet on already-installed runners.
        run: |
          for pkg in bzip2 zstd; do
            brew list --versions "$pkg" >/dev/null 2>&1 \
              || brew install "$pkg"
          done
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build --no-parallel

  build-ios:
    # Build + test on the iOS Simulator. Process-using SwiftGit
    # integration tests are gated `#if os(macOS) || os(Linux)` so they
    # don't compile here; the unit-shape suites in GitCommandTests,
    # GitLabTests, GitHubTests, ZipKitTests still run.
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Test (iOS Simulator)
        run: |
          xcodebuild \
            -scheme SwiftPorts-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            test

  build-linux:
    # Linux: full build + test, parity with Apple platforms.
    # libgit2 1.9.x needs OpenSSL + zlib + ca-certificates for HTTPS
    # clones; pkg-config wires libgit2's CMake config up correctly.
    # Container pinned to 6.2 — swift-configuration uses tools-version 6.2.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Install C dependencies
        # libssl/zlib are libgit2's transitive deps; bz2 / lzma / zstd
        # are needed by Bzip2Kit / XzKit / ZstdKit and by libarchive's
        # filters once Bzip2Support / LZMASupport / ZstdSupport traits
        # are on. lz4 backs Lz4Kit (libarchive's lz4 filter is not
        # enabled in our build — Lz4Kit is the path).
        run: |
          apt-get update
          apt-get install -y libssl-dev pkg-config ca-certificates \
                             zlib1g-dev libbz2-dev liblzma-dev \
                             libzstd-dev liblz4-dev
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build --no-parallel

  build-windows:
    # Full Windows build. The libgit2 fork
    # (`odrobnik/libgit2#windows-android-platforms`) wires up
    # WinHTTP / SSPI / BCrypt; libarchive (via marcprux/swift-archive)
    # ships archive_windows.{h,c} POSIX-compat shims so the C sources
    # build cleanly. The whole tree (`zip`, `unzip`, `gh`, `glab`,
    # `git`) compiles here.
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Install C dependencies (vcpkg)
        # vcpkg is preinstalled on windows-latest at C:\vcpkg.
        # x64-windows-static-md gives us .lib files linked against
        # the dynamic UCRT, which matches Swift's default link mode.
        #
        # libarchive uses the Unix link name `-lz`, which lld-link
        # translates to `z.lib`. vcpkg ships `zlib.lib`. Drop an
        # alias copy so the link resolves; bz2 / liblzma / libzstd
        # all happen to ship under the names lld-link expects.
        #
        # We install only zlib here — bz2 / lzma / zstd are not
        # needed by libarchive's CArchive (only GzipSupport trait
        # is enabled in Package.swift) and the Bzip2Kit / XzKit /
        # ZstdKit Swift modules are gated to non-Apple-mobile via
        # `condition: .when(platforms: [.macOS, .linux, .windows])`.
        # Their corresponding C shims still need the headers + libs
        # though — install all four so Bzip2Kit / XzKit / ZstdKit
        # link cleanly.
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install zlib bzip2 liblzma zstd lz4 --triplet x64-windows-static-md
          $base = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          # Always print the full inventory first (incl. debug/) so a
          # future naming mismatch is immediately visible in CI logs.
          # Use Write-Host + FullName instead of Format-Table — the
          # latter truncates names mid-display (last run printed
          # `zs.lib` when the actual file was something longer).
          Write-Host "vcpkg .lib inventory under $base (recursive):"
          Get-ChildItem "$base" -Recurse -Filter "*.lib" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "  $($_.FullName)" }
          # vcpkg's x64-windows-static-md triplet ships zlib's static
          # library as `zs.lib` (yes, really — the inventory above
          # confirmed this). Other vcpkg triplets and historical
          # releases used `zlib.lib`; cover both. libarchive's
          # `linkedLibrary("z")` looks up `z.lib`, so we always end
          # up aliasing the chosen artifact under that name.
          $candidates = @("zs.lib", "zlib.lib", "libzlib.lib", "libz.lib", "z.lib")
          $zlibLib = $null
          foreach ($name in $candidates) {
            $p = Join-Path "$base\lib" $name
            if (Test-Path $p) { $zlibLib = $p; break }
          }
          if (-not $zlibLib) {
            throw "no zlib library found under $base\lib (looked for: $($candidates -join ', '))"
          }
          Write-Host "Using zlib library: $zlibLib"
          if ($zlibLib -ne (Join-Path "$base\lib" "z.lib")) {
            Copy-Item -Force $zlibLib "$base\lib\z.lib"
          }
          "VCPKG_BASE=$base" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Build (Windows)
        shell: pwsh
        run: |
          swift build --build-tests -v `
            -Xcc "-I$env:VCPKG_BASE\include" `
            -Xlinker "/LIBPATH:$env:VCPKG_BASE\lib"
      - name: Test (Windows)
        shell: pwsh
        run: |
          swift test -v --skip-build --no-parallel `
            -Xcc "-I$env:VCPKG_BASE\include" `
            -Xlinker "/LIBPATH:$env:VCPKG_BASE\lib"

  # Uses skiptools/swift-android-action to install the swift.org Android
  # SDK + NDK + emulator stack. We then invoke `swift build` ourselves
  # so we can pass `--target` once per library target — SwiftPM's
  # `--target` flag is `Optional<String>` (last-wins), so a single
  # `swift build --target A --target B …` call only builds the last
  # entry.
  #
  # Library-only build: the executable targets (`zip`, `unzip`, `gh`,
  # `glab`, `git`) and XCTest test bundles still trip the action's
  # standalone-Bionic-ELF link path with `undefined symbol: __libc_init`
  # even after the libgit2 Bionic fixes landed (the ZIPFoundation arm
  # of the same set of fixes went away when the package moved onto
  # libarchive via `marcprux/swift-archive`). The realistic Android
  # consumer is SwiftBash embedding the libraries, so cover compile of
  # every library target individually and skip the link/emulator phase.
  # Re-enable the executable + test pass once
  # `skiptools/swift-android-action` ships an executable-friendly link
  # recipe.
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift Android SDK
        uses: skiptools/swift-android-action@v2
        with:
          # Pin to a full patch version. With the floating "6.3" key,
          # the action's cached host toolchain drifted to a 6.3.1 build
          # while the Android SDK at swift-6.3-release/android-sdk/…
          # stayed at the original 6.3 — emitting "module compiled with
          # Swift 6.3 cannot be imported by the Swift 6.3.1 compiler"
          # on every target. 6.3.2 ships matching host + SDK tarballs.
          swift-version: "6.3.2"
          free-disk-space: true
          build-package: false
          build-tests: false
          run-tests: false
      - name: Build each library target (Android)
        run: |
          for target in ForgeKit ZipKit ZipCommand UnzipCommand \
                        TarKit TarCommand \
                        GzipKit GzipCommand \
                        Bzip2Kit Bzip2Command \
                        XzKit XzCommand \
                        ZstdKit ZstdCommand \
                        Lz4Kit Lz4Command \
                        GitHub GhCommand GitLab GlabCommand \
                        SwiftGit GitCommand \
                        SQLiteKit Sqlite3Command; do
            echo "::group::swift build --target $target"
            swift build --swift-sdk "$SWIFT_SDK_TARGET" --target "$target"
            echo "::endgroup::"
          done
