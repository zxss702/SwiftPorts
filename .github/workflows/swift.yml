---
name: Swift
on:
  push:
    branches:
      - main
      - 'eval/**'
      - 'feat/**'
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      # macos-latest currently ships Xcode 16 / Swift 6.1; we need 6.2
      # because swift-configuration uses tools-version 6.2.
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Install C dependencies (Homebrew)
        # bzip2 / xz / zstd are needed by Bzip2Kit / XzKit / ZstdKit
        # and by libarchive's bz2 / xz / zstd filters. macOS bundles
        # libbz2 / liblzma in the SDK, but their pkg-config .pc files
        # ship via Homebrew only — and zstd isn't in the SDK at all.
        # Install all three so SwiftPM's pkgConfig resolution finds
        # them uniformly.
        run: brew install bzip2 xz zstd
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build --no-parallel

  build-ios:
    # Build + test on the iOS Simulator. Process-using SwiftGit
    # integration tests are gated `#if os(macOS) || os(Linux)` so they
    # don't compile here; the unit-shape suites in GitCommandTests,
    # GitLabTests, GitHubTests, ZipKitTests still run.
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Test (iOS Simulator)
        run: |
          xcodebuild \
            -scheme SwiftPorts-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            test

  build-linux:
    # Linux: full build + test, parity with Apple platforms.
    # libgit2 1.9.x needs OpenSSL + zlib + ca-certificates for HTTPS
    # clones; pkg-config wires libgit2's CMake config up correctly.
    # Container pinned to 6.2 — swift-configuration uses tools-version 6.2.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Install C dependencies
        # libssl/zlib are libgit2's transitive deps; bz2 / lzma / zstd
        # are needed by Bzip2Kit / XzKit / ZstdKit and by libarchive's
        # filters once Bzip2Support / LZMASupport / ZstdSupport traits
        # are on.
        run: |
          apt-get update
          apt-get install -y libssl-dev pkg-config ca-certificates \
                             zlib1g-dev libbz2-dev liblzma-dev libzstd-dev
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build --no-parallel

  build-windows:
    # Full Windows build. The libgit2 fork
    # (`odrobnik/libgit2#windows-android-platforms`) wires up
    # WinHTTP / SSPI / BCrypt; libarchive (via marcprux/swift-archive)
    # ships archive_windows.{h,c} POSIX-compat shims so the C sources
    # build cleanly. The whole tree (`zip`, `unzip`, `gh`, `glab`,
    # `git`) compiles here.
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Install C dependencies (vcpkg)
        # vcpkg is preinstalled on windows-latest at C:\vcpkg.
        # x64-windows-static-md gives us .lib files linked against
        # the dynamic UCRT, which matches Swift's default link mode.
        #
        # libarchive (and our CBzip2 / CLZMA / CZstd shims) use Unix-
        # style link names (`-lz`, `-lbz2`, `-llzma`, `-lzstd`) which
        # lld-link translates to `z.lib`, `bz2.lib`, `lzma.lib`,
        # `zstd.lib`. vcpkg uses Windows-style names (`zlib.lib`,
        # `bz2.lib` (matches), `lzma.lib` (matches), `zstd.lib`
        # (matches)). Drop a `z.lib` alias next to `zlib.lib` so
        # `-lz` resolves; the rest already line up.
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install zlib bzip2 liblzma zstd --triplet x64-windows-static-md
          $base = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          $zlib = Get-ChildItem -Path "$base\lib" -Filter "zlib*.lib" -File | Select-Object -First 1 -ExpandProperty FullName
          if (-not $zlib) {
            Write-Error "could not find zlib.lib under $base\lib"
            Get-ChildItem -Recurse "$base" | Select-Object FullName
            exit 1
          }
          Copy-Item -Force $zlib "$base\lib\z.lib"
          # Diagnostic: list everything vcpkg dropped, so a future
          # naming-mismatch surfaces in CI logs immediately.
          Write-Host "vcpkg .lib inventory:"
          Get-ChildItem "$base\lib" -Filter "*.lib" | Select-Object Name
          "VCPKG_BASE=$base" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ZLIB_BASE=$base"  | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Build (Windows)
        shell: pwsh
        run: |
          swift build --build-tests -v `
            -Xcc "-I$env:VCPKG_BASE\include" `
            -Xlinker "/LIBPATH:$env:VCPKG_BASE\lib"
      - name: Test (Windows)
        shell: pwsh
        run: |
          swift test -v --skip-build --no-parallel `
            -Xcc "-I$env:VCPKG_BASE\include" `
            -Xlinker "/LIBPATH:$env:VCPKG_BASE\lib"

  # Uses skiptools/swift-android-action to install the swift.org Android
  # SDK + NDK + emulator stack. We then invoke `swift build` ourselves
  # so we can pass `--target` once per library target — SwiftPM's
  # `--target` flag is `Optional<String>` (last-wins), so a single
  # `swift build --target A --target B …` call only builds the last
  # entry.
  #
  # Library-only build: the executable targets (`zip`, `unzip`, `gh`,
  # `glab`, `git`) and XCTest test bundles still trip the action's
  # standalone-Bionic-ELF link path with `undefined symbol: __libc_init`
  # even after the libgit2 + ZIPFoundation Bionic fixes landed. The
  # realistic Android consumer is SwiftBash embedding the libraries,
  # so cover compile of every library target individually and skip
  # the link/emulator phase. Re-enable the executable + test pass
  # once skiptools/swift-android-action ships an
  # executable-friendly link recipe.
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift Android SDK
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3"
          free-disk-space: true
          build-package: false
          build-tests: false
          run-tests: false
      - name: Build each library target (Android)
        run: |
          for target in ForgeKit ZipKit ZipCommand UnzipCommand \
                        TarKit TarCommand \
                        GzipKit GzipCommand \
                        Bzip2Kit Bzip2Command \
                        XzKit XzCommand \
                        ZstdKit ZstdCommand \
                        GitHub GhCommand GitLab GlabCommand \
                        SwiftGit GitCommand; do
            echo "::group::swift build --target $target"
            swift build --swift-sdk "$SWIFT_SDK_TARGET" --target "$target"
            echo "::endgroup::"
          done
