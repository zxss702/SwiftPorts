---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      # macos-latest currently ships Xcode 16 / Swift 6.1; we need 6.2
      # because swift-configuration uses tools-version 6.2.
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build --no-parallel

  build-ios:
    # Compile-only check on `generic/platform=iOS` (no simulator boots).
    # Catches API/portability breaks against the iOS SDK without paying
    # for a simulator phase. An iOS Simulator `xcodebuild test` step
    # was attempted but surfaces a separate class of issues (one test
    # hangs the simulator long enough to trigger xcodebuild's restart-
    # and-fail logic, even though a re-run passes); tracking that as
    # follow-up work rather than blocking this PR.
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build (iOS — all package targets)
        run: |
          xcodebuild \
            -scheme SwiftPorts-Package \
            -destination 'generic/platform=iOS' \
            build

  build-linux:
    # Linux: full build + test, parity with Apple platforms.
    # libgit2 1.9.x needs OpenSSL + zlib + ca-certificates for HTTPS
    # clones; pkg-config wires libgit2's CMake config up correctly.
    # Container pinned to 6.2 — swift-configuration uses tools-version 6.2.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Install C dependencies
        run: |
          apt-get update
          apt-get install -y libssl-dev pkg-config zlib1g-dev ca-certificates
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build --no-parallel

  build-windows:
    # Full Windows build. The libgit2 fork
    # (`odrobnik/libgit2#windows-android-platforms`) wires up
    # WinHTTP / SSPI / BCrypt; the ZIPFoundation fork
    # (`odrobnik/ZIPFoundation#fix/android-windows-imports`) ships
    # POSIX-compat shims (`PosixCompat+Windows.swift`) for the
    # mode_t / S_IF* / fseeko / timegm bits MSVC doesn't expose. The
    # whole tree (`zip`, `unzip`, `gh`, `glab`, `git`) compiles here.
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Install zlib (vcpkg)
        # vcpkg is preinstalled on windows-latest at C:\vcpkg.
        # x64-windows-static-md gives us a `zlib.lib` linked against
        # the dynamic UCRT, which matches Swift's default link mode.
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install zlib --triplet x64-windows-static-md
      - name: Build (Windows)
        shell: pwsh
        run: |
          $base = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          # ZIPFoundation pulls in zlib via the CZLib systemLibrary; the
          # fork's per-platform `linkerSettings` doesn't reliably
          # propagate `.linkedLibrary("zlib")` to the final executable
          # link, so inject `zlib.lib` here as well.
          swift build --build-tests -v `
            -Xcc "-I$base\include" `
            -Xlinker "/LIBPATH:$base\lib" `
            -Xlinker "zlib.lib"
      - name: Test (Windows)
        shell: pwsh
        run: |
          $base = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          swift test -v --skip-build --no-parallel `
            -Xcc "-I$base\include" `
            -Xlinker "/LIBPATH:$base\lib" `
            -Xlinker "zlib.lib"

  # Uses skiptools/swift-android-action which wraps the swift.org Android
  # SDK setup. No `container:` here — the action provisions its own
  # toolchain.
  #
  # Library-only build: the executable targets (`zip`, `unzip`, `gh`,
  # `glab`, `git`) link as standalone Bionic ELFs and trip the action's
  # CRT setup (`undefined symbol: __libc_init`). The XCTest test runner
  # is also an executable, so the test build is off too. The realistic
  # Android consumer is SwiftBash embedding the *libraries* — restrict
  # the build to library targets via `--target` flags and skip the
  # emulator test phase. Revisit once skiptools/swift-android-action
  # ships an executable-friendly link recipe.
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Build (Android — library targets only)
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3"
          free-disk-space: true
          build-tests: false
          run-tests: false
          swift-build-flags: >-
            --target ForgeKit
            --target ZipKit
            --target ZipCommand
            --target UnzipCommand
            --target GitHub
            --target GhCommand
            --target GitLab
            --target GlabCommand
            --target SwiftGit
            --target GitCommand
