---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel earlier runs of this workflow on the same branch as soon as
# a new commit comes in. SwiftPM checkouts of libgit2 are slow on
# fresh runners, so stacking runs wastes capacity.
concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build --no-parallel

  build-ios:
    # Compile-only check on `generic/platform=iOS` (no simulator boots).
    # Catches API/portability breaks against the iOS SDK without paying
    # for a simulator phase. Our Process-based test fixtures are gated
    # `#if os(macOS) || os(Linux) || os(Windows)` so the test bundle
    # itself stays a non-iOS concern.
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build (iOS — all package targets)
        run: |
          xcodebuild \
            -scheme SwiftPorts-Package \
            -destination 'generic/platform=iOS' \
            build

  build-linux:
    # Linux: full build + test, parity with Apple platforms.
    # libgit2 1.9.x needs OpenSSL + zlib + ca-certificates for HTTPS
    # clones; pkg-config wires libgit2's CMake config up correctly.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Install C dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config zlib1g-dev ca-certificates
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build --no-parallel

  build-windows:
    # Investigation job: libgit2 1.9.x via ibrahimcetin/libgit2 doesn't
    # advertise official Windows support, so collect compiler/test
    # failures without blocking the macOS / iOS / Linux jobs.
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows)
        run: swift build --build-tests -v
        continue-on-error: true
      - name: Test (Windows)
        run: swift test -v --skip-build --no-parallel
        continue-on-error: true

  # Uses skiptools/swift-android-action which wraps the swift.org Android
  # SDK setup AND runs the SwiftPM tests on an x86_64 Android emulator.
  # No `container:` here — the action provisions its own toolchain and
  # the emulator setup needs nested KVM, which only works on the bare
  # ubuntu-* runner image.
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Build & Test (Android emulator)
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3"
          # The default GitHub Linux runner has ~14 GiB free; the SDK,
          # NDK, and emulator together push past that without cleanup.
          free-disk-space: true
